server:
    port: ${OFFICE_AUTH_PROVIDER_SERVER_PORT}
spring:
    application:
        name: office-auth-provider
    jpa:
        hibernate.ddl-auto: none
        properties.hibernate.jdbc.time_zone: ${OFFICE_AUTH_PROVIDER_JPA_TIMEZONE}
    datasource:
        url: jdbc:postgresql://${OFFICE_AUTH_PROVIDER_DATASOURCE_DB_URL}:${OFFICE_AUTH_PROVIDER_DATASOURCE_DB_PORT}/${OFFICE_AUTH_PROVIDER_DATASOURCE_DB_SCHEMA}
        username: ${OFFICE_AUTH_PROVIDER_DATASOURCE_USERNAME}
        password: ${OFFICE_AUTH_PROVIDER_DATASOURCE_PASSWORD}
        driver-class-name: org.postgresql.Driver
        liquibase:
            change-log: classpath:db/changelog/db.changelog-master.yaml
    config:
        import: "optional:configserver:"
    cloud:
        gateway:
            enabled: true
        config:
            discovery:
                enabled: true
                service-id: ${OFFICE_CONFIG_MAPPING_SERVER_HOSTNAME}
            username: ${OFFICE_CONFIG_MAPPING_SECURITY_USERNAME}
            password: ${OFFICE_CONFIG_MAPPING_SECURITY_PASSWORD}
eureka:
    instance:
        prefer-ip-address: false
    client:
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: http://admin:${OFFICE_SERVICE_REGISTRY_SECURITY_PASSWORD}@${OFFICE_SERVICE_REGISTRY_SERVER_IP_ADDRESS}:${OFFICE_SERVICE_REGISTRY_SERVER_PORT}/eureka
properties:
    security: dummy
    cors:
        allowed-origins: ${OFFICE_AUTH_PROVIDER_CORS_ALLOWED_ORIGINS}
grpc:
    server:
        port: ${OFFICE_AUTH_PROVIDER_GRPC_PORT}
server:
    port: ${OFFICE_SERVICE_REGISTRY_SERVER_PORT}
spring:
    security:
        user:
            name: admin
            password: ${OFFICE_SERVICE_REGISTRY_SECURITY_PASSWORD}
    cloud:
        loadbalancer:
            enabled: true
    application:
        name: office-service-registry
eureka:
    instance:
        hostname: ${OFFICE_SERVICE_REGISTRY_SERVER_HOSTNAME}
    client:
        register-with-eureka: false
        fetch-registry: false
logging:
    level:
        com.netflix.eureka: OFF
        com.netflix.discovery: OFF
server:
    port: ${OFFICE_EXPENDITURE_SERVICE_SERVER_PORT}
spring:
    application:
        name: office-expenditure-service
    jpa:
        hibernate.ddl-auto: none
        properties.hibernate.jdbc.time_zone: ${OFFICE_EXPENDITURE_SERVICE_JPA_TIMEZONE}
    datasource:
        url: jdbc:postgresql://${OFFICE_EXPENDITURE_SERVICE_DATASOURCE_DB_URL}:${OFFICE_EXPENDITURE_SERVICE_DATASOURCE_DB_PORT}/${OFFICE_EXPENDITURE_SERVICE_DATASOURCE_DB_SCHEMA}
        username: ${OFFICE_EXPENDITURE_SERVICE_DATASOURCE_USERNAME}
        password: ${OFFICE_EXPENDITURE_SERVICE_DATASOURCE_PASSWORD}
        driver-class-name: org.postgresql.Driver
        liquibase:
            change-log: classpath:db/changelog/db.changelog-master.yaml
    config:
        import: "optional:configserver:"
    cloud:
        gateway:
            enabled: true
        config:
            discovery:
                enabled: true
                service-id: ${OFFICE_CONFIG_MAPPING_SERVER_HOSTNAME}
            username: ${OFFICE_CONFIG_MAPPING_SECURITY_USERNAME}
            password: ${OFFICE_CONFIG_MAPPING_SECURITY_PASSWORD}
eureka:
    instance:
        prefer-ip-address: false
    client:
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: http://admin:${OFFICE_SERVICE_REGISTRY_SECURITY_PASSWORD}@${OFFICE_SERVICE_REGISTRY_SERVER_IP_ADDRESS}:${OFFICE_SERVICE_REGISTRY_SERVER_PORT}/eureka
properties:
    security: dummy
    cors:
        allowed-origins: ${OFFICE_EXPENDITURE_SERVICE_CORS_ALLOWED_ORIGINS}
    jwt:
        secret: ${OFFICE_EXPENDITURE_SERVICE_JWT_SECRET}
grpc:
    server:
        port: ${OFFICE_EXPENDITURE_SERVICE_GRPC_PORT}
jwt:
    secret: ${OFFICE_EXPENDITURE_SERVICE_JWT_SECRET}
    expiration.millis: ${OFFICE_EXPENDITURE_SERVICE_JWT_EXPIRATION_MILLIS}

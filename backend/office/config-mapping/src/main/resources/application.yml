server:
    port: ${OFFICE_CONFIG_MAPPING_SERVER_PORT}
spring:
  application:
    name: office-config-mapping
  security:
      user:
          name: ${OFFICE_CONFIG_MAPPING_SECURITY_USERNAME}
          password: ${OFFICE_CONFIG_MAPPING_SECURITY_PASSWORD}
  profiles:
      active: native
  cloud:
      config:
          server:
              native:
                  search-locations: file:/${OFFICE_CONFIG_MAPPING_CONFIG_FILE}
eureka:
    instance:
        prefer-ip-address: false
    client:
        register-with-eureka: true
        fetch-registry: true
        serviceUrl:
            defaultZone: http://admin:${OFFICE_SERVICE_REGISTRY_SECURITY_PASSWORD}@${OFFICE_SERVICE_REGISTRY_SERVER_IP_ADDRESS}:${OFFICE_SERVICE_REGISTRY_SERVER_PORT}/eureka/
grpc:
    server:
        port: ${OFFICE_CONFIG_MAPPING_GRPC_PORT}
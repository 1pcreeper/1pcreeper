server:
    port: ${GENERAL_API_GATEWAY_SERVER_PORT}
    servlet:
        context-path: ${GENERAL_API_GATEWAY_CONTEXT_PATH}
spring:
    application:
        name: general-api-gateway
    main:
        web-application-type: reactive 
    config:
        import: "optional:configserver:"
    cloud:
        gateway:
            enabled: true
        config:
            discovery:
                enabled: true
                service-id: ${GENERAL_CONFIG_MAPPING_SERVER_HOSTNAME}
            username: ${GENERAL_CONFIG_MAPPING_SECURITY_USERNAME}
            password: ${GENERAL_CONFIG_MAPPING_SECURITY_PASSWORD}
eureka:
    instance:
        prefer-ip-address: false
    client:
        register-with-eureka: true
        fetch-registry: true
        service-url:
            defaultZone: http://admin:${GENERAL_SERVICE_REGISTRY_SECURITY_PASSWORD}@${GENERAL_SERVICE_REGISTRY_SERVER_IP_ADDRESS}:${GENERAL_SERVICE_REGISTRY_SERVER_PORT}/eureka
logging:
    level:
        org.springframework.cloud.gateway: DEBUG
properties:
    servlet:
        context-path: ${GENERAL_API_GATEWAY_CONTEXT_PATH}
    spec:
        general-account-service:
            hostName: ${GENERAL_ACCOUNT_SERVICE_SERVER_HOSTNAME}
            httpPort: ${GENERAL_ACCOUNT_SERVICE_SERVER_PORT}
            grpcPort: ${GENERAL_ACCOUNT_SERVICE_GRPC_PORT}
    jwt:
        issuer-uri: ${OAUTH2_RESOURCE_JWT_ISSUER_LOCATION}
    cors:
        allowed-origins: ${GENERAL_API_GATEWAY_CORS_ALLOWED_ORIGINS}
grpc:
    server:
        port: ${GENERAL_API_GATEWAY_GRPC_PORT}

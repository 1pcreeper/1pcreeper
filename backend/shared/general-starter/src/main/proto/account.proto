
syntax = "proto3";

package general_account;
option java_multiple_files = true;
option java_package="project.shared_general_starter.grpc";
option java_outer_classname="GeneralAccountServiceProto";

service GeneralAccountRPCService{
  rpc findById(AppUserRequest) returns (AppUserResponse);
}
//====================================================================================================
message AppUserRequest{
    string id = 1;
}
//message VerifyUserForBusinessRightsRequest{
//    string userId = 1;
//    string businessId = 2;
//    repeated string rightIds = 3;
//}
//====================================================================================================
message AppUserResponse{
    string id = 1;
}
//========================================================================================================